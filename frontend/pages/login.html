<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="../assets/pawsome_icon.jpg" type="image/svg+xml">
        <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Gamja+Flower&family=Mynerve&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/login_styles.css">
        <title>Login User | Pawsome</title>
    </head>
    <body>
        <form onsubmit="getLoginCreds(event)">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username"><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>
            <div id="message"></div>
            <button type="submit">Login</button>
        </form>
        <div id="register">
            <p>New here? <a href="../pages/register.html">Register</a></p>
        </div>
        <script src="../js/script.js"></script>
    </body>
</html>
